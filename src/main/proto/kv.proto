syntax = "proto3";

package kv;

option java_multiple_files = true;
option java_package = "org.example.grpc.proto";
option java_outer_classname = "KVServiceProto";

import "google/protobuf/wrappers.proto";

service KVService {

    rpc Put (PutRequest) returns (PutResponse);
    rpc Get (GetRequest) returns (GetResponse);
    rpc Delete (DeleteRequest) returns (DeleteResponse);
    rpc Range (RangeRequest) returns (stream KeyValuePair);
    rpc Count (CountRequest) returns (CountResponse);
}

message PutRequest {
    string key = 1;
    google.protobuf.BytesValue value = 2;
}

message PutResponse {
    bool success = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool exists = 1;
  string key = 2;
  google.protobuf.BytesValue value = 3;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool success = 1;
}

message RangeRequest {
  string key_since = 1;
  string key_to = 2;
}

message KeyValuePair {
  string key = 1;
  google.protobuf.BytesValue value = 2;
}

message CountRequest {}

message CountResponse {
  int64 count = 1;
}